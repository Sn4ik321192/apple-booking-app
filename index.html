<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Booking App</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="bg"></div>

  <div class="card">

    <div class="profile">
      <img id="userAvatar" class="avatar" src="" alt="avatar">

      <div>
        <div id="userName" class="user-name">
          Гость
        </div>

        <div id="userUsername" class="user-username">
          @guest
        </div>
      </div>
    </div>

    <h1>Booking</h1>

    <p>Запись в один клик</p>

    <input type="text" id="name" placeholder="Ваше имя">

    <div class="services">

      <div class="service-card active"
           onclick="selectService(this,'💇 Стрижка')">
        💇 Стрижка
      </div>

      <div class="service-card"
           onclick="selectService(this,'💅 Маникюр')">
        💅 Маникюр
      </div>

      <div class="service-card"
           onclick="selectService(this,'🎮 Другое')">
        🎮 Другое
      </div>

    </div>

    <input type="text" id="time" placeholder="Время">

    <button onclick="sendData()">
      Записаться
    </button>

    <div class="success" id="success">
      ✅ Заявка отправлена
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
