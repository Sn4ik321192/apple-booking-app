<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Apple Booking App</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="bg"></div>

  <main class="app">

    <section class="card">

      <div class="profile">
        <img id="userAvatar" class="avatar" src="" alt="avatar">

        <div>
          <div id="userName" class="user-name">Гость</div>
          <div id="userUsername" class="user-username">@guest</div>
        </div>
      </div>

      <div id="homePage" class="page active-page">
        <h1>Booking</h1>
        <p>Премиальная запись в один клик</p>

        <button onclick="openBookingPage()">
          Открыть запись
        </button>
      </div>

      <div id="bookingPage" class="page">
        <h1>Запись</h1>
        <p>Выберите услугу, дату и время</p>

        <input type="text" id="name" placeholder="Ваше имя">

        <div class="services">
          <div class="service-card active" onclick="selectService(this,'💇 Стрижка')">
            💇 Стрижка
          </div>

          <div class="service-card" onclick="selectService(this,'💅 Маникюр')">
            💅 Маникюр
          </div>

          <div class="service-card" onclick="selectService(this,'🎮 Другое')">
            🎮 Другое
          </div>
        </div>

        <label class="input-label">📅 Дата</label>
        <input type="date" id="date">

        <label class="input-label">⏰ Время</label>
        <select id="time">
          <option>10:00</option>
          <option>11:00</option>
          <option>12:00</option>
          <option>13:00</option>
          <option>14:00</option>
          <option>15:00</option>
          <option>16:00</option>
          <option>17:00</option>
          <option>18:00</option>
          <option>19:00</option>
        </select>

        <button onclick="sendData()">
          Записаться
        </button>

        <div class="success" id="success">
          ✅ Заявка отправлена
        </div>
      </div>

      <div id="profilePage" class="page">
        <h1>Profile</h1>
        <p>Ваш Telegram профиль</p>

        <div class="profile-big">
          <img id="profileAvatar" class="profile-avatar" src="" alt="avatar">
          <h2 id="profileName">User</h2>
          <span id="profileUsername">@username</span>
        </div>
      </div>

    </section>

  </main>

  <nav class="bottom-nav">
    <div class="nav-item active-nav" onclick="openHomePage()">
      <span>🏠</span>
      <p>Home</p>
    </div>

    <div class="nav-item" onclick="openBookingPage()">
      <span>📅</span>
      <p>Booking</p>
    </div>

    <div class="nav-item" onclick="openProfilePage()">
      <span>👤</span>
      <p>Profile</p>
    </div>
  </nav>

  <script src="script.js"></script>

</body>
</html>
