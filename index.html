<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Booking App</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    }

    body{
      background:#0f0f10;
      color:white;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    .bg{
      position:absolute;
      width:500px;
      height:500px;
      background:linear-gradient(45deg,#3b82f6,#8b5cf6);
      filter:blur(120px);
      opacity:0.4;
      border-radius:50%;
    }

    .card{
      position:relative;
      width:350px;
      padding:30px;
      border-radius:35px;

      background:rgba(255,255,255,0.08);

      backdrop-filter:blur(20px);

      border:1px solid rgba(255,255,255,0.1);

      box-shadow:
      0 8px 32px rgba(0,0,0,0.3);

      animation:fade 1s ease;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    h1{
      font-size:32px;
      margin-bottom:10px;
      font-weight:700;
    }

    p{
      color:#bdbdbd;
      margin-bottom:25px;
    }

    input{
      width:100%;
      padding:16px;
      margin-bottom:15px;

      border:none;
      border-radius:18px;

      background:rgba(255,255,255,0.08);

      color:white;
      font-size:16px;

      outline:none;
    }

    button{
      width:100%;
      padding:16px;

      border:none;
      border-radius:20px;

      background:white;
      color:black;

      font-size:16px;
      font-weight:600;

      cursor:pointer;

      transition:0.3s;
    }

    button:hover{
      transform:scale(1.03);
    }

    .success{
      margin-top:20px;
      text-align:center;
      color:#7CFFB2;
      display:none;
    }

  </style>
</head>

<body>

<div class="bg"></div>

<div class="card">

  <h1>Booking</h1>

  <p>Запись в один клик</p>

  <input type="text" id="name" placeholder="Ваше имя">

  <input type="text" id="service" placeholder="Услуга">

  <input type="text" id="time" placeholder="Время">

  <button onclick="sendData()">
    Записаться
  </button>

  <div class="success" id="success">
    ✅ Заявка отправлена
  </div>

</div>

<script>

function sendData(){

  let name =
    document.getElementById("name").value;

  let service =
    document.getElementById("service").value;

  let time =
    document.getElementById("time").value;

  console.log(name,service,time);

  document.getElementById("success")
    .style.display = "block";
}

</script>

</body>
</html>
